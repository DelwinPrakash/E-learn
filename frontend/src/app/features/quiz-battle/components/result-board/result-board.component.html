<div class="result-overlay">
  <div class="result-card">
    <div class="celebration-icon">🎊</div>
    <h1 class="title">Battle Results</h1>
    <div class="list">
      <div class="row" *ngFor="let p of leaderboard; index as i" [class.winner]="i === 0">
        <div class="rank">#{{ i + 1 }}</div>
        <div class="avatar">{{ p.name.charAt(0) }}</div>
        <div class="name">{{ p.name }}</div>
        <div class="score">{{ p.score }} pts</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="restart-btn" (click)="restart()">Play Again</button>
      <button class="close-btn" (click)="close()">Exit to Dashboard</button>
    </div>
  </div>
</div>
