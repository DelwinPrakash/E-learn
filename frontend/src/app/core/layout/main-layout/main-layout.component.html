<div class="dashboard-container">
    <!-- Mobile Overlay -->
    <div class="sidebar-overlay" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()"></div>

    <!-- Sidebar -->
    <div class="sidebar" [class.collapsed]="isSidebarCollapsed" [class.mobile-open]="isMobileMenuOpen">
        <div class="sidebar-header">
            <div class="sidebar-logo">📚 E-learn</div>
            <button class="toggle-btn" (click)="toggleSidebar()">
                {{ isSidebarCollapsed ? '→' : '←' }}
            </button>
        </div>

        <div class="menu-section" *ngIf="filteredOverviewItems.length > 0">
            <div class="menu-title">Overview</div>
            <ul class="menu-list">
                <li *ngFor="let item of filteredOverviewItems" class="menu-item" [class.active]="isActive(item.route)"
                    [routerLink]="[item.route]" (click)="closeMobileMenu()">
                    <span class="menu-icon">{{ item.icon }}</span>
                    <span class="menu-text">{{ item.name }}</span>
                </li>
            </ul>
        </div>

        <div class="menu-section" *ngIf="filteredLearnItems.length > 0">
            <div class="menu-title">Learn</div>
            <ul class="menu-list">
                <li *ngFor="let item of filteredLearnItems" class="menu-item" [class.active]="isActive(item.route)"
                    [routerLink]="[item.route]" (click)="closeMobileMenu()">
                    <span class="menu-icon">{{ item.icon }}</span>
                    <span class="menu-text">{{ item.name }}</span>
                </li>
            </ul>
        </div>

        <div class="menu-section" *ngIf="filteredPracticeItems.length > 0">
            <div class="menu-title">Practice</div>
            <ul class="menu-list">
                <li *ngFor="let item of filteredPracticeItems" class="menu-item" [class.active]="isActive(item.route)"
                    [routerLink]="[item.route]" (click)="closeMobileMenu()">
                    <span class="menu-icon">{{ item.icon }}</span>
                    <span class="menu-text">{{ item.name }}</span>
                </li>
            </ul>
        </div>

        <div class="menu-section" *ngIf="filteredTeacherItems.length > 0">
            <div class="menu-title">Teacher Area</div>
            <ul class="menu-list">
                <li *ngFor="let item of filteredTeacherItems" class="menu-item" [class.active]="isActive(item.route)"
                    [routerLink]="[item.route]" (click)="closeMobileMenu()">
                    <span class="menu-icon">{{ item.icon }}</span>
                    <span class="menu-text">{{ item.name }}</span>
                </li>
            </ul>
        </div>

        <div class="menu-section" *ngIf="filteredProfileItems.length > 0">
            <div class="menu-title">Profile</div>
            <ul class="menu-list">
                <li *ngFor="let item of filteredProfileItems" class="menu-item" [class.active]="isActive(item.route)"
                    [routerLink]="[item.route]" (click)="closeMobileMenu()">
                    <span class="menu-icon">{{ item.icon }}</span>
                    <span class="menu-text">{{ item.name }}</span>
                </li>
            </ul>
        </div>

        <div class="sidebar-footer">
            <button class="theme-toggle" [class.active]="isDarkMode" (click)="toggleTheme()">
                <span class="menu-icon">{{ isDarkMode ? '🌙' : '☀️' }}</span>
                <span class="menu-text">{{ isDarkMode ? 'Dark Mode' : 'Light Mode' }}</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navigation -->
        <div class="top-nav">
            <div class="nav-brand">
                <button class="mobile-menu-btn" (click)="toggleMobileMenu()" aria-label="Toggle Menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="user-actions">
                <div class="user-profile" *ngIf="userDetails">
                    <span class="user-name">{{userDetails.name}}</span>
                    <div class="user-avatar">{{ getInitials() }}</div>
                </div>
                <button class="logout-btn" (click)="logout()">
                    Logout
                </button>
            </div>
        </div>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
