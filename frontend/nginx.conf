server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;   # Handles Angular routes
    }

    location /api/ {
        proxy_pass http://backend:3000;    # Proxies API calls to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}